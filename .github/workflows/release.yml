name: fdx-natives

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux:
    name: Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake
      - name: Build package
        run: ./gradlew packageLinuxX64
      - uses: actions/upload-artifact@v7
        with:
          name: fdx-natives-linux-x64
          path: build/packages/*.zip
          if-no-files-found: error

  windows:
    name: Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64
      - name: Build package
        run: .\gradlew.bat packageWindowsX64
      - uses: actions/upload-artifact@v7
        with:
          name: fdx-natives-windows-x64
          path: build/packages/*.zip
          if-no-files-found: error

  macos_x64:
    name: macOS x64
    runs-on: macos-26-intel
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Build package
        run: ./gradlew packageMacosX64
      - uses: actions/upload-artifact@v7
        with:
          name: fdx-natives-macos-x64
          path: build/packages/*.zip
          if-no-files-found: error

  macos_arm64:
    name: macOS arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Build package
        run: ./gradlew packageMacosArm64
      - uses: actions/upload-artifact@v7
        with:
          name: fdx-natives-macos-arm64
          path: build/packages/*.zip
          if-no-files-found: error

  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: android-actions/setup-android@v4
      - name: Install Android native toolchain
        run: |
          set +o pipefail
          yes | sdkmanager --licenses
          set -o pipefail
          sdkmanager "platforms;android-36" "ndk;27.0.12077973" "cmake;3.22.1"
      - name: Build package
        run: ./gradlew packageAndroidAll
      - uses: actions/upload-artifact@v7
        with:
          name: fdx-natives-android
          path: build/packages/*.zip
          if-no-files-found: error

  web:
    name: Web Emscripten
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: mymindstorm/setup-emsdk@v16
        with:
          version: "6.0.0"
      - name: Build package
        run: ./gradlew packageWeb
      - uses: actions/upload-artifact@v7
        with:
          name: fdx-natives-web
          path: build/packages/*.zip
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs:
      - linux
      - windows
      - macos_x64
      - macos_arm64
      - android
      - web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - uses: actions/download-artifact@v8
        with:
          path: build/packages
          merge-multiple: true
      - name: Write release manifest
        run: ./gradlew writeReleaseManifest
      - uses: actions/upload-artifact@v7
        with:
          name: fdx-natives-release
          path: |
            build/packages/*.zip
            build/packages/fdx-natives-manifest.json
          if-no-files-found: error
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/packages/*.zip
            build/packages/fdx-natives-manifest.json
